<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      var path = window.location.pathname;
      var repo = '/DashboardDbSQLite';
      if (path.startsWith(repo)) {
        path = path.slice(repo.length) || '/';
      }
      sessionStorage.redirect = path;
      window.location.replace(repo + '/?p=1');
    </script>
  </head>
  <body></body>
</html>
